name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            suffix: aarch64
          - os: macos-latest
            target: x86_64-apple-darwin
            suffix: x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install frontend deps
        run: npm ci

      - name: Build Tauri App
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        run: npm run tauri build -- --target ${{ matrix.target }}

      - name: Collect artifact paths
        id: artifacts
        run: |
          DMG=$(ls src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg | head -1)
          UPDATER_GZ=$(ls src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.tar.gz | head -1)
          UPDATER_SIG="${UPDATER_GZ}.sig"
          echo "DMG=$DMG" >> $GITHUB_OUTPUT
          echo "UPDATER_GZ=$UPDATER_GZ" >> $GITHUB_OUTPUT
          echo "UPDATER_SIG=$UPDATER_SIG" >> $GITHUB_OUTPUT
          echo "UPDATER_FILENAME=$(basename $UPDATER_GZ)" >> $GITHUB_OUTPUT
          echo "SIG=$(cat $UPDATER_SIG)" >> $GITHUB_OUTPUT

      - name: Upload GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.artifacts.outputs.DMG }}
            ${{ steps.artifacts.outputs.UPDATER_GZ }}
            ${{ steps.artifacts.outputs.UPDATER_SIG }}

      - name: Upload updater info
        uses: actions/upload-artifact@v4
        with:
          name: updater-${{ matrix.suffix }}
          path: |
            ${{ steps.artifacts.outputs.UPDATER_GZ }}
            ${{ steps.artifacts.outputs.UPDATER_SIG }}

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Download aarch64 updater info
        uses: actions/download-artifact@v4
        with:
          name: updater-aarch64
          path: updater-aarch64

      - name: Download x64 updater info
        uses: actions/download-artifact@v4
        with:
          name: updater-x64
          path: updater-x64

      - name: Generate latest.json
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          AARCH64_GZ=$(ls updater-aarch64/*.tar.gz | head -1)
          X64_GZ=$(ls updater-x64/*.tar.gz | head -1)
          AARCH64_SIG=$(cat ${AARCH64_GZ}.sig)
          X64_SIG=$(cat ${X64_GZ}.sig)
          AARCH64_FILENAME=$(basename $AARCH64_GZ)
          X64_FILENAME=$(basename $X64_GZ)
          cat > latest.json << EOF
          {
            "version": "$VERSION",
            "notes": "版本 $VERSION",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "darwin-aarch64": {
                "url": "https://github.com/${{ github.repository }}/releases/download/v$VERSION/$AARCH64_FILENAME",
                "signature": "$AARCH64_SIG"
              },
              "darwin-x86_64": {
                "url": "https://github.com/${{ github.repository }}/releases/download/v$VERSION/$X64_FILENAME",
                "signature": "$X64_SIG"
              }
            }
          }
          EOF

      - name: Deploy latest.json to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          include_files: latest.json
          keep_files: true
